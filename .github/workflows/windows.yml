name: Windows ARM64 linalg debug

on:
  pull_request:
    branches:
      - main
      - maintenance/**

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read # to fetch code (actions/checkout)

jobs:
  #=======================================================================================
  # Windows ARM64 with OpenBLAS — verify complex det/solve fix
  #=======================================================================================
  win_arm64_openblas:
    name: Win ARM64, openblas64, linalg
    runs-on: windows-11-arm
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          fetch-tags: true
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
          architecture: arm64

      - name: Setup MSVC
        uses: bus1/cabuild/action/msdevshell@e22aba57d6e74891d059d66501b6b5aed8123c4d  # v1
        with:
          architecture: arm64

      - name: Install pkg-config
        run: |
          python -m pip install pkgconf

      - name: Build and install with OpenBLAS
        run: |
          python -m pip install -r requirements/build_requirements.txt
          pip install -r requirements/ci_requirements.txt
          spin config-openblas --with-scipy-openblas=32
          $env:PKG_CONFIG_PATH="$pwd/.openblas"
          python -m pip install --no-build-isolation . -v -Csetup-args="--vsenv" -Csetup-args="-Dallow-noblas=false" 2>&1 | tee build.log

      - name: Install test dependencies
        run: |
          python -m pip install -r requirements/test_requirements.txt

      - name: Run linalg tests
        run: |
          cd tools
          python -m pytest --pyargs numpy.linalg.tests -v -k "(test_types and TestDet) or (test_types and TestSolve) or (test_types and TestSlogdet) or test_solve_complex_banded" --timeout=60
